---
name: Continuous Integration 🔄

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  pre-commit:
    name: Run pre-commit hooks 🪝
    runs-on: ubuntu-latest
    steps:
      - name: Set up repository 🧩
        # Pinned to actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python 🐍
        # Pinned to actions/setup-python@v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.x"
          cache: "pip"
      - name: Install test dependencies 🧪
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run pre-commit hooks 🪝
        run: |
          pre-commit run --all-files --show-diff-on-failure

  test-plugin-integration:
    name: >-
      Run tests 🧪 [NB ${{ matrix.netbox-version }} | Py
      ${{ matrix.python-version }}${{ matrix.coverage && ' | coverage' || '' }}]
    needs:
      - pre-commit
    runs-on: ubuntu-latest
    env:
      COVERAGE_RCFILE: ${{ github.workspace }}/netbox_aci_plugin/pyproject.toml
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        netbox-version: ["v4.5.0", "v4.5.10", "v4.6.0", "main"]
        include:
          # Collect coverage on a single leg (newest stack); the other legs
          # run the plain test suite.
          - coverage: false
          - python-version: "3.14"
            netbox-version: "main"
            coverage: true
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres
        env:
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository of the plugin 🧩
        # Pinned to actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: netbox_aci_plugin

      - name: Checkout repository of NetBox ${{ matrix.netbox-version }} 📦
        # Pinned to actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: "netbox-community/netbox"
          ref: ${{ matrix.netbox-version }}
          path: netbox

      - name: Set up Python ${{ matrix.python-version }} 🐍
        # Pinned to actions/setup-python@v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Set up NetBox configuration for testing 🧪
        working-directory: netbox
        run: |
          ln -s $(pwd)/../netbox_aci_plugin/.ci/configuration.testing.py \
            netbox/netbox/configuration.py

      - name: Install dependencies for NetBox 📦
        working-directory: netbox
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Plugin in NetBox environment 🧩
        working-directory: netbox_aci_plugin
        run: |
          pip install -e ".[test]"

      - name: Check for missing migrations 🧪
        working-directory: netbox
        run: |
          python netbox/manage.py makemigrations netbox_aci_plugin --check

      - name: Run Django tests 🧪
        if: ${{ ! matrix.coverage }}
        working-directory: netbox
        run: |
          python netbox/manage.py test netbox_aci_plugin.tests --parallel -v 2

      - name: Run Django tests with coverage 🧪
        if: ${{ matrix.coverage }}
        working-directory: netbox
        run: |
          coverage run netbox/manage.py test \
            netbox_aci_plugin.tests --parallel -v 2

      - name: Combine coverage data 🧪
        if: ${{ matrix.coverage }}
        working-directory: netbox
        run: coverage combine

      - name: Show coverage report 🧪
        if: ${{ matrix.coverage }}
        working-directory: netbox
        run: coverage report
...
