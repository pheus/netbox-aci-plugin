---
# see:
# Packaging guide (GitHub Actions):
# https://packaging.python.org/en/latest/guides/\
# publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/
name: Publish Python 🐍 distribution 📦

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

# least privilege by default; jobs escalate as needed
permissions:
  contents: read

# avoid overlapping publishes if tags are pushed rapidly
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository 🧩
        # Pinned to actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python 🐍
        # Pinned to actions/setup-python@v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install pypa/build 🏗️
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine
      - name: Build wheel and sdist 📦
        run: |
          python -m build
      - name: Validate metadata
        run: |
          twine check dist/*
      - name: Upload the distribution packages 📦
        # Pinned to actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 7

  check-version:
    name: Check project versioning 🏷️
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository 🧩
        # Pinned to actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python 🐍
        # Pinned to actions/setup-python@v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Extract version from pyproject.toml and set as env variable 📝
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib; \
            f = open('pyproject.toml', 'rb'); data = tomllib.load(f); \
            print(data['project']['version']); f.close()")
          echo "PACKAGE_VERSION=$PYPROJECT_VERSION" >> $GITHUB_ENV
        shell: bash
      - name: Check if project version matches the git tag 🏷️
        run: |
          TAG=$(git describe HEAD --tags --abbrev=0 | sed 's/^v//')
          echo "Tag (without 'v'): $TAG"
          echo "Package version: $PACKAGE_VERSION"
          if [[ "$TAG" != "$PACKAGE_VERSION" ]]; then
            echo "Error: Tag does not match the package version."
            exit 1
          fi

  github-release:
    name: Prepare GitHub release 🚀
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - check-version
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository 🧩
        # Pinned to actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Capture version from tag 📝
        run: |
          TAG=$(git describe HEAD --tags --abbrev=0 | sed 's/^v//')
          echo "PACKAGE_VERSION=$TAG" >> "$GITHUB_ENV"
      - name: Download dists 📦
        # Pinned to actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-package-distributions
          path: dist/
      - name: Build release notes from CHANGELOG 📝
        run: |
          set -e
          VERSION="${{ env.PACKAGE_VERSION }}"
          # include the matching header and lines until the next '## [...]'
          awk "/^## \\[?${VERSION}\\]?/ {print; flag=1; next} \
          /^## \\[/ && flag {exit} flag" CHANGELOG.md > RELEASE.md
          # fallback if section not found or file empty
          if ! [ -s RELEASE.md ]; then
            {
              echo "## ${VERSION}"
              echo
              echo "_No changelog entry found for this tag._"
            } > RELEASE.md
          fi
      - name: Create draft release 🚀
        # Pinned to softprops/action-gh-release@v3.0.0
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # yamllint disable-line rule:line-length
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body_path: ${{ github.workspace }}/RELEASE.md
          draft: true
          # mark prereleases automatically for a*, b*, rc* tags (optional)
          prerelease: >-
            ${{ contains(env.PACKAGE_VERSION, 'a')
                || contains(env.PACKAGE_VERSION, 'b')
                || contains(env.PACKAGE_VERSION, 'rc') }}
          files: |
            dist/*.whl
            dist/*.tar.gz

  publish-to-pypi:
    name: Publish distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish on tag pushes
    needs:
      - check-version
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/netbox-aci-plugin
    # mandatory for trusted publishing (OIDC)
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dists 📦
        # Pinned to actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI 🐍
        # Pinned to pypa/gh-action-pypi-publish@v1.14.0
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # yamllint disable-line rule:line-length
        with:
          packages-dir: dist/
          skip-existing: true
...
