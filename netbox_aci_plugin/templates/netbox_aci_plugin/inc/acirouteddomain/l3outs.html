{% extends 'generic/object_children.html' %}
{% load helpers %}
{% load i18n %}

{% block extra_controls %}
  {% if perms.netbox_aci_plugin.add_acil3out %}
    {% with viewname=object|viewname:"" %}
      <a href="{% url 'plugins:netbox_aci_plugin:acil3out_add' %}?aci_routed_domain={{ object.pk }}&aci_fabric={{ object.aci_fabric.pk }}&return_url={% url viewname pk=object.pk %}" class="btn btn-primary">
        <i class="mdi mdi-plus-thick" aria-hidden="true"></i> {% trans "Add an L3Out" %}
      </a>
    {% endwith %}
  {% endif %}
{% endblock %}
