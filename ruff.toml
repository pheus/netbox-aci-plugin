# Ruff configuration
####################

# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Enforce line length and indent-width
line-length = 88
indent-width = 4

# Groups diagnostics by file and rule for readability
# output-format = "grouped"

# Ignores anything in .gitignore
respect-gitignore = true

# When running with --fix, shows which fixes are applied/available
show-fixes = true

# Always generate Python 3.12-compatible code.
target-version = "py312"

[lint]
# Enable the core Ruff/pyflakes checks plus a focused set of pycodestyle rules.
select = [
    "E4",   # pycodestyle: import-related errors
    "E7",   # pycodestyle: statement-related errors
    "E9",   # pycodestyle: syntax/runtime errors
    "F",    # pyflakes: unused imports/variables, undefined names, etc.
]
extend-select = [
    "C4",    # flake8-comprehensions: avoid unnecessary comprehension patterns
    "E1",    # pycodestyle: indentation errors
    "E2",    # pycodestyle: whitespace around operators and delimiters
    "E3",    # pycodestyle: blank-line spacing around definitions
    "E501",  # pycodestyle: line too long
    "D",     # pydocstyle: docstring style and coverage
    "I",     # isort-equivalent: import sorting
    "ISC",   # flake8-implicit-str-concat: implicit string concatenation
    "RET",   # flake8-return: return statement consistency
    "RUF022",# Ruff: sorted `__all__` lists
    "SIM",   # flake8-simplify: simplification opportunities
    "SLF",   # flake8-self: private member access
    "UP",    # pyupgrade: modern Python syntax upgrades
    "PTH",   # pathlib: prefer pathlib over os.path
    "W505",  # pydocstyle: docstring line length
    "W",     # pycodestyle warnings: style warnings and deprecated patterns
]
ignore = [
    "D100",   # pydocstyle: missing docstring in public module
    "D104",   # pydocstyle: missing docstring in public package (__init__.py)
    "D105",   # pydocstyle: missing docstring in magic method
    "D106",   # pydocstyle: missing docstring in nested class
    "D107",   # pydocstyle: missing docstring in __init__
    "RET504", # flake8-return: unnecessary temporary variable before `return`
    "UP032",  # pyupgrade: prefer f-strings over `str.format()`
]
preview = true

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
"**/__init__.py"   = ["D104"]  # missing docstring in public package (__init__.py)
"**/migrations/*.py" = ["D", "E501"]   # For Django/NetBox plugin migrations
"**/tests/*.py" = ["D"]
"**/views/__init__.py" = ["RUF022"]

[lint.flake8-self]
ignore-names = ["_meta", "Meta"]

[lint.isort]
known-first-party = [
    "account",
    "circuits",
    "core",
    "dcim",
    "extras",
    "ipam",
    "netbox",
    "tenancy",
    "users",
    "utilities",
    "virtualization",
    "vpn",
    "wireless",
]

[lint.pycodestyle]
max-doc-length = 79

[lint.pydocstyle]
# Choose a docstring style (one of: "google", "numpy", "pep257").
convention = "pep257"

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Enforce UNIX line ending
line-ending = "lf"

# Format Python code blocks found inside docstrings
docstring-code-format = true
